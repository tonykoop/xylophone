<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600" role="img" aria-label="Xylophone bar drawing template — title block, datum chain, critical dimensions">
  <style><![CDATA[
    .frame { fill: none; stroke: #111; stroke-width: 1.5; }
    .bar { fill: #d29470; stroke: #5a2a18; stroke-width: 1.2; }
    .dim { fill: none; stroke: #c33; stroke-width: 0.8; }
    .dim-text { font: 12px Inter, system-ui, sans-serif; fill: #c33; text-anchor: middle; }
    .label { font: 11px Inter, system-ui, sans-serif; fill: #111; }
    .title { font: 16px Inter, system-ui, sans-serif; fill: #111; font-weight: 600; }
    .sub { font: 12px Inter, system-ui, sans-serif; fill: #555; }
    .datum { fill: #06c; }
  ]]></style>

  <!-- Sheet border -->
  <rect class="frame" x="20" y="20" width="960" height="560"/>

  <!-- Title block (lower right) -->
  <rect class="frame" x="640" y="460" width="340" height="120"/>
  <line class="frame" x1="640" y1="490" x2="980" y2="490"/>
  <line class="frame" x1="640" y1="520" x2="980" y2="520"/>
  <line class="frame" x1="640" y1="550" x2="980" y2="550"/>
  <line class="frame" x1="800" y1="460" x2="800" y2="580"/>
  <line class="frame" x1="900" y1="460" x2="900" y2="580"/>
  <text class="title" x="650" y="481">XYL-DR-01 — Bar Template (parametric)</text>
  <text class="label" x="650" y="510">Note: &lt;NOTE&gt;</text>
  <text class="label" x="810" y="510">Family: XYL</text>
  <text class="label" x="910" y="510">Scale: 1:2</text>
  <text class="label" x="650" y="540">Material: Padauk</text>
  <text class="label" x="810" y="540">Finish: Tung+wax</text>
  <text class="label" x="910" y="540">Rev: A</text>
  <text class="label" x="650" y="570">Designed: T. Koop</text>
  <text class="label" x="810" y="570">Date: 2026-05-08</text>
  <text class="label" x="910" y="570">Sheet 1/1</text>

  <!-- Bar plan view: scale 1:2, longest bar L=16.683 in -> 16.683 * 36 px = 600 px (using 36 px/in at 1:2 with 72 dpi assumption) -->
  <!-- Place bar at (160, 200) for L=600 px wide, W=1.5 in -> 54 px tall -->
  <rect class="bar" x="160" y="200" width="600" height="54"/>

  <!-- Datum: lower-left corner of bar -->
  <circle class="datum" cx="160" cy="254" r="4"/>
  <text class="label" x="135" y="270">A</text>

  <!-- Node holes at 22.4% and 77.6% of L -->
  <circle cx="294" cy="227" r="6" fill="#fff" stroke="#5a2a18" stroke-width="1.2"/>
  <circle cx="626" cy="227" r="6" fill="#fff" stroke="#5a2a18" stroke-width="1.2"/>
  <text class="label" x="294" y="200" text-anchor="middle">node hole, Ø1/8"</text>
  <text class="label" x="626" y="200" text-anchor="middle">node hole, Ø1/8"</text>

  <!-- Strike line annotation at L/2 -->
  <line class="dim" x1="460" y1="186" x2="460" y2="200" stroke-dasharray="4 3"/>
  <text class="label" x="460" y="180" text-anchor="middle">strike line</text>

  <!-- Length dimension below bar (datum A to right end) -->
  <line class="dim" x1="160" y1="290" x2="760" y2="290"/>
  <line class="dim" x1="160" y1="285" x2="160" y2="295"/>
  <line class="dim" x1="760" y1="285" x2="760" y2="295"/>
  <text class="dim-text" x="460" y="305">L = &lt;BAR_LENGTH_IN&gt; in</text>

  <!-- Hole position dims -->
  <line class="dim" x1="160" y1="330" x2="294" y2="330"/>
  <line class="dim" x1="160" y1="325" x2="160" y2="335"/>
  <line class="dim" x1="294" y1="325" x2="294" y2="335"/>
  <text class="dim-text" x="227" y="346">0.224 × L</text>

  <line class="dim" x1="160" y1="360" x2="626" y2="360"/>
  <line class="dim" x1="160" y1="355" x2="160" y2="365"/>
  <line class="dim" x1="626" y1="355" x2="626" y2="365"/>
  <text class="dim-text" x="393" y="376">0.776 × L</text>

  <!-- Width dimension on the right -->
  <line class="dim" x1="780" y1="200" x2="780" y2="254"/>
  <line class="dim" x1="775" y1="200" x2="785" y2="200"/>
  <line class="dim" x1="775" y1="254" x2="785" y2="254"/>
  <text class="dim-text" x="800" y="232" text-anchor="start">W = 1.500 in</text>

  <!-- Section view (top right) showing thickness h -->
  <rect class="bar" x="640" y="80" width="220" height="35"/>
  <line class="dim" x1="640" y1="135" x2="860" y2="135"/>
  <line class="dim" x1="635" y1="135" x2="645" y2="135"/>
  <line class="dim" x1="855" y1="135" x2="865" y2="135"/>
  <text class="dim-text" x="750" y="150">section: h = 0.875 in (1/16" round-over all long edges)</text>
  <text class="label" x="640" y="70">Section A-A</text>

  <!-- Notes -->
  <text class="label" x="40" y="50">Tolerances: bar length ±1/64", hole positions ±1/32".</text>
  <text class="label" x="40" y="68">Datum A: lower-left bar end, plan view.</text>
  <text class="label" x="40" y="86">Generator: substitute &lt;NOTE&gt; and &lt;BAR_LENGTH_IN&gt; from family-spec.csv.</text>
</svg>
